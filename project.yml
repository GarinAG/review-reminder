name: ReviewReminder
options:
  bundleIdPrefix: com.reviewreminder
  deploymentTarget:
    macOS: "15.0"
  defaultConfig: Debug
  generateEmptyDirectories: true

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "6.0.0"

targets:
  ReviewReminder:
    type: application
    platform: macOS
    sources:
      - Sources/ReviewReminder
    resources:
      - Resources/Assets.xcassets
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: Review Reminder
        CFBundleIdentifier: com.reviewreminder
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        LSUIElement: true
        CFBundleIconFile: AppIcon
        NSPrincipalClass: NSApplication
        NSUserNotificationAlertStyle: alert
        NSHumanReadableCopyright: ""
    entitlements:
      path: Resources/ReviewReminder.entitlements
    dependencies:
      - package: GRDB
    settings:
      base:
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        CODE_SIGN_IDENTITY: "-"
        PRODUCT_BUNDLE_IDENTIFIER: com.reviewreminder
        SWIFT_STRICT_CONCURRENCY: complete
        ENABLE_HARDENED_RUNTIME: NO
      configs:
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

  ReviewReminderTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/ReviewReminderTests
    dependencies:
      - target: ReviewReminder
    settings:
      base:
        SWIFT_VERSION: "6.0"
