name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build (release)
        run: swift build -c release

      - name: Assemble .app bundle
        run: |
          set -euo pipefail
          APP_NAME="ReviewReminder"
          APP_PATH=".build/bundle/$APP_NAME.app"
          mkdir -p "$APP_PATH/Contents/MacOS" "$APP_PATH/Contents/Resources"
          cp ".build/release/$APP_NAME" "$APP_PATH/Contents/MacOS/$APP_NAME"
          cp Resources/Info.plist "$APP_PATH/Contents/Info.plist"
          [ -f Resources/AppIcon.icns ] && cp Resources/AppIcon.icns "$APP_PATH/Contents/Resources/AppIcon.icns"
          codesign --force --sign - --entitlements Resources/ReviewReminder.entitlements "$APP_PATH"

      - name: Zip app
        run: |
          cd .build/bundle
          ditto -c -k --sequesterRsrc --keepParent ReviewReminder.app ReviewReminder.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: .build/bundle/ReviewReminder.zip
          generate_release_notes: true

      - name: Compute sha256
        id: sha
        run: echo "sha256=$(shasum -a 256 .build/bundle/ReviewReminder.zip | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: garinag/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update cask
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i '' "s/version \".*\"/version \"$VERSION\"/" tap/Casks/review-reminder.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"${{ steps.sha.outputs.sha256 }}\"/" tap/Casks/review-reminder.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "review-reminder $VERSION" || exit 0
          git push
